# gitleaks config (instructions.md §17, §22.3 CI secret scan)
[extend]
useDefault = true

[allowlist]
description = "Docs examples + test fixtures (not real secrets)"
paths = [
  '''instructions\.md''',                    # blueprint contains illustrative examples
  '''.*/tests?/.*''',                        # test files use fake tokens (ghp_aaaa…, EICAR)
  '''.*test_.*\.py''',
  '''.*\.test\.ts''',
  '''services/.*/keys/.*''',                 # runtime dev keys (gitignored)
  '''.*/test/fixtures/.*\.test\.pem''',      # TEST-ONLY ES256 TASK JWT keypair (§13.4 seam)
  '''evals/.*''',                            # adversarial corpus
  '''\.env\.example''',                      # template placeholders (REPLACE_WITH_…), never real
  '''.*/\.pytest_cache/.*''',                # generated pytest cache echoes test-fixture ids, not source
]
regexes = [
  '''ghp_a{36}''',                           # obvious fake GitHub token in tests
  '''AKIAA{16}''',                           # obvious fake AWS key in tests
  '''7c9e6679-7425-40de-944b-e07fc1f90ae7''', # canonical example UUID (doc Idempotency-Key, not a secret)
]
