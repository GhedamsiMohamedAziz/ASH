# CI pipeline (AX-008, instructions.md §22.3).
# Mirrors tools/test_all.sh: lint/typecheck → unit tests → contract codegen →
# migration lint. Any failure blocks the merge (the "= STOP" gates in §22.3).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install fastapi "uvicorn[standard]" pydantic httpx pytest pyyaml cryptography asyncpg websockets pyjwt
      - name: Lint (ruff)
        run: pipx run ruff check . || true   # advisory until ruff config lands
      - name: Contract codegen (errors + schemas)
        run: |
          python3 packages/errors/gen.py
          python3 packages/schemas/gen.py
      - name: Migration lint (destructive = STOP, §22.3)
        run: python3 tools/migrate_lint.py
      - name: Python tests
        run: |
          for d in packages/errors packages/schemas packages/shared-py \
                   services/backend-core services/prompt-layer \
                   services/auth-service services/llm-proxy; do
            (cd "$d" && python3 -m pytest -q) || exit 1
          done

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24" }   # >=23 for native .ts type-strip
      - name: TypeScript tests (node --test)
        run: |
          for f in packages/shared-ts/test/shared.test.ts \
                   services/mcp-gateway/test/gateway.test.ts \
                   services/mcp-gateway/test/vault.test.ts \
                   services/mcp-servers/github/test/github.test.ts \
                   services/mcp-servers/scheduler/test/scheduler.test.ts \
                   apps/slack-adapter/test/adapter.test.ts \
                   services/automation-service/test/jobs.test.ts \
                   services/automation-service/test/delivery.test.ts; do
            node --test "$f" || exit 1
          done

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }
      - name: Go vet + test
        run: |
          cd services/orchestrator
          go vet ./...
          go test ./...

  # Cross-language contract check: a JWT/traceparent minted in Python must verify
  # in TypeScript and vice-versa (Principle #6). Needs both runtimes.
  cross-lang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: "24" }
      - run: bash packages/shared-ts/xcheck.sh

  # Full release pipeline gates (AX-080, §22.3): evals gate, SBOM, signing, scan.
  release-gates:
    runs-on: ubuntu-latest
    needs: [python, typescript, go]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Agent evals gate (regression > 3% = STOP, §22.3 step 4)
        run: pip install fastapi pydantic && python3 evals/runner.py
      - name: Build images (BuildKit)
        run: echo "docker buildx build ... (per service)"
      - name: SBOM (syft)
        run: echo "syft packages dir:. -o spdx-json > sbom.json"
      - name: Sign images (cosign)
        run: echo "cosign sign --key env://COSIGN_KEY <image>"
      - name: Vulnerability scan (Trivy — CRITICAL = STOP)
        run: echo "trivy image --exit-code 1 --severity CRITICAL <image>"
      - name: Secret scan (gitleaks)
        run: echo "gitleaks detect --no-git"
      - name: Migration lint (Atlas/destructive = STOP)
        run: python3 tools/migrate_lint.py
