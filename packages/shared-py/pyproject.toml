[project]
name = "olma-shared"
version = "0.1.0"
description = "Axone shared runtime helpers — JWT, idempotency, bus, telemetry (instructions.md §5, §8)"
requires-python = ">=3.10"
dependencies = []  # stdlib-only by design; NATS/OTel/Redis backends are optional extras

[project.optional-dependencies]
dev = ["pytest>=8"]
nats = ["nats-py>=2.6"]
otel = ["opentelemetry-sdk>=1.24"]
redis = ["redis>=5"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]
